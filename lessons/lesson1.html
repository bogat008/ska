    <h2>Что такое 한글 (Хангыль)?</h2>
    <p>Хангыль — это корейский алфавит, созданный в 1443 году. Он состоит из 14 согласных и 10 гласных букв.</p>

    <h2>Базовые буквы</h2>
    <table border="1" style="margin: 0 auto; text-align: center;">
      <tr><th>Гласные</th><th>Произношение</th></tr>
      <tr><td>ㅏ</td><td>a</td></tr>
      <tr><td>ㅓ</td><td>eo</td></tr>
      <tr><td>ㅗ</td><td>o</td></tr>
      <tr><td>ㅜ</td><td>u</td></tr>
      <tr><td>ㅡ</td><td>eu</td></tr>
      <tr><td>ㅣ</td><td>i</td></tr>
    </table>
